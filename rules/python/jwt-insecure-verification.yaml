rules:
  - id: jwt-verification-disabled
    languages: [python]
    severity: ERROR
    message: >-
      JWT signature verification is disabled. The application will accept tokens
      it never validated, so an attacker can forge a token with any claims —
      including another user's identity or an elevated role. Verify the
      signature with an explicit algorithm allow-list.
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp: "A02:2021 - Cryptographic Failures"
      owasp-api: "API2:2023 - Broken Authentication"
      confidence: HIGH
      impact: HIGH
      references:
        - https://cwe.mitre.org/data/definitions/347.html
        - https://pyjwt.readthedocs.io/en/stable/api.html
      technology: [pyjwt, jwt]
    patterns:
      - pattern-either:
          # verify=False passed directly
          - pattern: jwt.decode(..., verify=False, ...)
          # verification switched off via the options dict
          - pattern: 'jwt.decode(..., options={..., "verify_signature": False, ...}, ...)'
          - pattern: 'jwt.decode(..., options={..., "verify_exp": False, ...}, ...)'
          - pattern: 'jwt.decode(..., options={..., "verify_aud": False, ...}, ...)'

  - id: jwt-none-algorithm-accepted
    languages: [python]
    severity: ERROR
    message: >-
      The 'none' algorithm is included in the accepted algorithms list. Tokens
      using alg=none carry no signature at all, so any client can mint a valid
      token. Remove 'none' and list only the asymmetric or HMAC algorithm you
      actually issue tokens with.
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp-api: "API2:2023 - Broken Authentication"
      confidence: HIGH
      impact: HIGH
      references:
        - https://auth0.com/blog/critical-vulnerabilities-in-json-web-token-libraries/
      technology: [pyjwt, jwt]
    patterns:
      - pattern-either:
          - pattern: jwt.decode(..., algorithms=[..., "none", ...], ...)
          - pattern: jwt.decode(..., algorithms=[..., "None", ...], ...)
          - pattern: jwt.decode(..., algorithms=[..., "NONE", ...], ...)

  - id: jwt-decoded-without-key
    languages: [python]
    severity: WARNING
    message: >-
      jwt.decode() is called without a signing key or algorithms list. Depending
      on the library version this either fails or skips verification. If you
      only need to read claims before validating, use a clearly named helper and
      never trust the result for an authorization decision.
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      confidence: MEDIUM
      impact: HIGH
      technology: [pyjwt, jwt]
    patterns:
      - pattern: jwt.decode($TOKEN)
